<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elaichi — Speisekarte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1A2744;--navy-deep:#0E1929;--navy-mid:#1F3050;
  --gold:#C8A45C;--gold-light:#E8D5A0;--gold-dark:#9A7B3A;
  --cream:#FFF8EC;--cream-dim:rgba(255,248,236,.85);
  --coral:#FF6B6B;--coral-soft:#FF9B8E;
  --teal:#2EC4B6;--teal-soft:#5DD8CC;
  --purple:#845EC2;--purple-soft:#A87FD8;
  --amber:#F9A825;--amber-soft:#FFC04D;
}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:var(--navy-deep);
  color:var(--cream);
  min-height:100vh;
  overflow-x:hidden;
}

/* ═══ Texture overlay ═══ */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(255,107,107,.04), transparent),
    radial-gradient(ellipse 50% 60% at 15% 70%, rgba(46,196,182,.04), transparent),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(200,164,92,.03), transparent);
}

/* ═══ Container ═══ */
.menu-wrap{
  position:relative;z-index:1;
  max-width:540px;margin:0 auto;
  padding:0 20px 60px;
}

/* ═══ Header ═══ */
.header{
  text-align:center;
  padding:48px 0 28px;
}
.logo-ring{
  width:120px;height:120px;margin:0 auto 24px;
  border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  box-shadow:0 0 40px rgba(200,164,92,.25), 0 0 80px rgba(200,164,92,.08);
  animation:pulse 4s ease-in-out infinite alternate;
}
@keyframes pulse{
  0%{box-shadow:0 0 40px rgba(200,164,92,.25), 0 0 80px rgba(200,164,92,.08)}
  100%{box-shadow:0 0 50px rgba(200,164,92,.4), 0 0 100px rgba(200,164,92,.12)}
}
.logo-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}

.title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,8vw,52px);
  font-weight:700;
  letter-spacing:.12em;
  background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
}
.subtitle{
  font-family:'Outfit',sans-serif;
  font-size:clamp(11px,2.5vw,14px);
  font-weight:300;
  letter-spacing:.35em;
  color:var(--gold-light);
  opacity:.55;
  text-transform:uppercase;
}

/* ═══ Divider ═══ */
.divider{
  display:flex;align-items:center;gap:14px;
  padding:6px 0;margin:0 10px;
}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,164,92,.3),transparent)}
.divider-gem{
  width:8px;height:8px;
  background:var(--gold);opacity:.5;
  transform:rotate(45deg);border-radius:1px;
  flex-shrink:0;
}

/* ═══ Section ═══ */
.section{
  margin-top:8px;
  animation:fadeUp .6s ease both;
}
.section:nth-child(2){animation-delay:.1s}
.section:nth-child(3){animation-delay:.2s}
.section:nth-child(4){animation-delay:.3s}
.section:nth-child(5){animation-delay:.4s}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ═══ Category header ═══ */
.cat-head{
  display:flex;align-items:center;gap:14px;
  padding:16px 0 14px;
}
.cat-icon{
  width:44px;height:44px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.cat-menus .cat-icon{background:linear-gradient(135deg,var(--coral),var(--coral-soft))}
.cat-vorspeisen .cat-icon{background:linear-gradient(135deg,var(--teal),var(--teal-soft))}
.cat-dessert .cat-icon{background:linear-gradient(135deg,var(--purple),var(--purple-soft))}
.cat-beilage .cat-icon{background:linear-gradient(135deg,var(--amber),var(--amber-soft))}

.cat-label{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,6vw,38px);
  font-weight:600;
  letter-spacing:.02em;
}
.cat-menus .cat-label{color:var(--coral-soft)}
.cat-vorspeisen .cat-label{color:var(--teal-soft)}
.cat-dessert .cat-label{color:var(--purple-soft)}
.cat-beilage .cat-label{color:var(--amber-soft)}

/* ═══ Menu item ═══ */
.item{
  display:flex;align-items:baseline;
  padding:12px 0;
  border-bottom:1px solid rgba(200,164,92,.06);
  transition:background .25s, padding .25s;
}
.item:last-child{border-bottom:none}

.item-name{
  font-family:'Outfit',sans-serif;
  font-size:clamp(17px,3.8vw,22px);
  font-weight:400;
  color:var(--cream);
  letter-spacing:.01em;
  white-space:nowrap;
}
.item-dots{
  flex:1;min-width:16px;
  margin:0 10px;
  border-bottom:2px dotted rgba(200,164,92,.18);
  align-self:center;
  transform:translateY(-3px);
}
.item-price{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,5vw,30px);
  font-weight:700;
  white-space:nowrap;
  flex-shrink:0;
}
.cat-menus .item-price{color:var(--coral)}
.cat-vorspeisen .item-price{color:var(--teal)}
.cat-dessert .item-price{color:var(--purple)}
.cat-beilage .item-price{color:var(--amber)}

.item-price .chf{
  font-family:'Outfit',sans-serif;
  font-size:clamp(11px,2.4vw,14px);
  font-weight:400;
  opacity:.55;
  margin-right:3px;
  vertical-align:baseline;
}

/* ═══ Hover (desktop) ═══ */
@media(hover:hover){
  .item:hover{
    background:rgba(200,164,92,.03);
    padding-left:6px;padding-right:6px;
    margin:0 -6px;border-radius:10px;
  }
}

/* ═══ Footer ═══ */
.footer{
  text-align:center;
  padding:16px 0 0;
}
.footer-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(11px,2.5vw,13px);
  letter-spacing:.25em;
  color:var(--gold);opacity:.35;
  text-transform:uppercase;
}
</style>
</head>
