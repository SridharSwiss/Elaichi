<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="Elaichi Logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elaichi Dielsdorf Menu 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1A2744;--navy-deep:#0E1929;
  --gold:#C8A45C;--gold-light:#E8D5A0;--gold-dark:#9A7B3A;
  --cream:#FFF8EC;--cream-dim:rgba(255,248,236,.85);--navy-mid:#1F3050;
  --coral:#FF6B6B;--coral-soft:#FF9B8E;
  --teal:#2EC4B6;--teal-soft:#5DD8CC;
  --purple:#845EC2;--purple-soft:#A87FD8;
  --amber:#F9A825;--amber-soft:#FFC04D;
}
html,body{
  height:100%;
  font-family:'Outfit',sans-serif;
  background:var(--navy-deep);
  color:var(--cream);
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(255,107,107,.04), transparent),
    radial-gradient(ellipse 50% 60% at 15% 70%, rgba(46,196,182,.04), transparent),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(200,164,92,.03), transparent);
}

/* ── Single-screen fit: flex column fills exactly 100dvh ── */
.menu-wrap{
  position:relative;z-index:1;
  width:100%;max-width:540px;
  margin:0 auto;
  height:100dvh;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
}

/* ── Header ── */
.header{text-align:center;flex-shrink:0;}
.logo-ring{
  width:clamp(56px,9vh,96px);
  height:clamp(56px,9vh,96px);
  margin:0 auto clamp(4px,1vh,10px);
  border-radius:50%;
  box-shadow:0 0 40px rgba(200,164,92,.35), 0 0 90px rgba(200,164,92,.12);
  animation:pulse 4s ease-in-out infinite alternate;
}
.logo-ring img{
  width:100%;height:100%;
  border-radius:50%;object-fit:cover;display:block;
}
@keyframes pulse{
  0%{box-shadow:0 0 40px rgba(200,164,92,.35), 0 0 90px rgba(200,164,92,.12)}
  100%{box-shadow:0 0 60px rgba(200,164,92,.55), 0 0 120px rgba(200,164,92,.2)}
}
.title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,4vh,38px);
  font-weight:700;letter-spacing:.12em;line-height:1.1;
  background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:2px;
}
.subtitle{
  font-family:'Outfit',sans-serif;
  font-size:clamp(8px,1.3vh,12px);font-weight:300;letter-spacing:.35em;
  color:var(--gold-light);opacity:.55;text-transform:uppercase;
}

/* ── Divider ── */
.divider{display:flex;align-items:center;gap:14px;margin:0 10px;flex-shrink:0;}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,164,92,.3),transparent)}
.divider-gem{width:6px;height:6px;background:var(--gold);opacity:.5;transform:rotate(45deg);border-radius:1px;flex-shrink:0;}

/* ── Section ── */
.section{flex-shrink:0;animation:fadeUp .6s ease both;}
.section.cat-menus{animation-delay:.1s}
.section.cat-dessert{animation-delay:.2s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── Category header ── */
.cat-head{display:flex;align-items:center;gap:10px;padding:clamp(3px,.8vh,8px) 0;}
.cat-icon{
  width:clamp(28px,4vh,38px);height:clamp(28px,4vh,38px);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(13px,2.2vh,17px);flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.cat-menus .cat-icon{background:linear-gradient(135deg,var(--coral),var(--coral-soft))}
.cat-dessert .cat-icon{background:linear-gradient(135deg,var(--purple),var(--purple-soft))}
.cat-label{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(16px,3.2vh,26px);
  font-weight:600;letter-spacing:.02em;
}
.cat-menus .cat-label{color:var(--coral-soft)}
.cat-dessert .cat-label{color:var(--purple-soft)}

/* ── Menu item ── */
.item{
  display:flex;align-items:baseline;
  padding:clamp(2px,.55vh,6px) 0;
  border-bottom:1px solid rgba(200,164,92,.06);
  transition:background .25s,padding .25s;
}
.item:last-child{border-bottom:none}
.item-name{
  font-family:'Outfit',sans-serif;
  font-size:clamp(11px,1.9vh,17px);
  font-weight:400;color:var(--cream);letter-spacing:.01em;
  white-space:nowrap;
}
.item-dots{
  flex:1;min-width:10px;margin:0 8px;
  border-bottom:2px dotted rgba(200,164,92,.18);
  align-self:center;transform:translateY(-2px);
}
.item-price{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(14px,2.6vh,22px);
  font-weight:700;white-space:nowrap;flex-shrink:0;
}
.cat-menus .item-price{color:var(--coral)}
.cat-dessert .item-price{color:var(--purple)}
.item-price .chf{
  font-family:'Outfit',sans-serif;
  font-size:clamp(8px,1.3vh,11px);
  font-weight:400;opacity:.55;margin-right:3px;vertical-align:baseline;
}
@media(hover:hover){
  .item:hover{background:rgba(200,164,92,.03);padding-left:6px;padding-right:6px;margin:0 -6px;border-radius:8px;}
}

/* ── Footer ── */
.footer{text-align:center;flex-shrink:0;}
.footer-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(8px,1.2vh,11px);
  letter-spacing:.25em;color:var(--gold);opacity:.35;text-transform:uppercase;
}
</style>
</head>
<body>
<div class="menu-wrap">
  <header class="header">
    <div class="logo-ring">
      <img src="Elaichi Logo.png">
    </div>
    <h1 class="title">Menu Dielsdorf 2026</h1>
    <p class="subtitle">Catering &amp; Restaurants</p>
  </header>

  <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>

  <section class="section cat-menus">
    <div class="cat-head">
      <div class="cat-icon">🍛</div>
      <div class="cat-label">Hauptgericht / Main</div>
    </div>
    <div class="item"><span class="item-name">Butter Chicken</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>18</span></div>
    <div class="item"><span class="item-name">Vegi Masala</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>18</span></div>
    <div class="item"><span class="item-name">Chicken Wrap</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>15</span></div>
    <div class="item"><span class="item-name">Vegi Wrap</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>14</span></div>
    <div class="item"><span class="item-name">Samosa Chaat</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>15</span></div>
    <div class="item"><span class="item-name">Samosa</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>8</span></div>
    <div class="item"><span class="item-name">Naan</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>3</span></div>
  </section>

  <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>

  <section class="section cat-dessert">
    <div class="cat-head">
      <div class="cat-icon">🍨</div>
      <div class="cat-label">Dessert</div>
    </div>
    <div class="item"><span class="item-name">Gulab Jamun with Ice cream (2 Stk.)</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>10</span></div>
    <div class="item"><span class="item-name">Falooda With Kulfi</span><span class="item-dots"></span><span class="item-price"><span class="chf">CHF</span>12</span></div>
  </section>

  <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>

  <footer class="footer">
    <p class="footer-text">Elaichi — Frisch · Authentisch · Lecker</p>
  </footer>
</div>
</body>
</html>
